{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card">

        <div class="card-header">

            Create Project

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-success">

                    Save

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock  %}
