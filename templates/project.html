{% extends 'base.html' %}

{% block content %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container-fluid d-flex align-items-center" style="text-align:center";>
        <div style="width: 80px;" class="d-none d-lg-block"></div>
        <span class="navbar-brand mb-0 h1 fs-5 text-secondary mx-auto text-center text-white fw-bold">
            Welcome <span class="text-white fw-bold"> {{ user.username }}</span>
        </span>
        
        
    </div>
</nav>
<div class="container mt-5">

    <div class="d-flex justify-content-between mb-4">
        <h2>My Projects</h2>

        <a href="{% url 'project_create' %}"
           class="btn btn-primary">
            Create Project
        </a>
    </div>

    {% for project in projects %}

    <div class="card mb-3">

        <div class="card-body">

            <h5>{{ project.name }}</h5>

            <p>{{ project.description }}</p>

            <span class="badge bg-info">

                {{ project.status }}

            </span>

            <div class="mt-3">

                <a href="{% url 'project_update' project.id %}"
                   class="btn btn-warning btn-sm">

                    Edit

                </a>

                <a href="{% url 'project_delete' project.id %}"
                   class="btn btn-danger btn-sm">

                    Delete

                </a>

            </div>

        </div>

    </div>

    {% empty %}

    <div class="alert alert-info">
        No Projects Found
    </div>

    {% endfor %}

</div>

{% endblock %}
